name: skill-governance-ci

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Lint skill assets from source (check-only)
        run: |
          if [ -d "$HOME/.hermes/skills" ]; then
            python3 scripts/lint_skill_assets.py \
              --source "$HOME/.hermes/skills" \
              --waivers policies/waivers.yaml \
              --report-json reports/lint-report.json
          else
            echo "INFO: ~/.hermes/skills not present in GitHub runner; lint skipped"
          fi
      - name: Validate registry schema
        run: python3 scripts/validate_registry.py --registry registry/skill-index.yaml
      - name: Build report
        run: python3 scripts/build_skill_report.py --root . --out reports/skill-report.md
      - name: Generate PR governance summary
        run: python3 scripts/generate_pr_comment.py --lint-json reports/lint-report.json --out reports/pr-comment.md
      - name: Upload governance reports
        uses: actions/upload-artifact@v4
        with:
          name: skill-governance-reports
          path: reports/
      - name: Comment summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('reports/pr-comment.md', 'utf8');
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100
            });
            const marker = '<!-- skill-governance-report -->';
            const existing = comments.find(c => c.user?.type === 'Bot' && c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body
              });
            }
